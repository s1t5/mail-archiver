version: '3.8'

networks:
  postgres:

services:
  mailarchive-app:
    build: .
    restart: always
    ports:
      - "5000:5000"
    networks:
      - postgres
      # Uncomment the following line to mount a directory for local file imports
      # (also add the path to appsettings.json: LocalImport.AllowedPaths)
      # - /path/to/your/mbox/files:/data/import
      - ./appsettings.json:/app/appsettings.json
      - ./logs:/app/logs
      - ./data-protection-keys:/app/DataProtection-Keys
      # Uncomment to enable file-based attachment storage:
      # - ./attachments:/app/attachments
    depends_on:
      - postgres

  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: MailArchiver
      POSTGRES_USER: mailuser
      POSTGRES_PASSWORD: masterkey
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailuser -d MailArchiver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
